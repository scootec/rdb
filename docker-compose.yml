services:
  rdb:
    image: ghcr.io/shanescott/rdb:latest
    build: .
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/volumes:/var/lib/docker/volumes:ro
      - rdb-cache:/root/.cache/restic
    environment:
      - RESTIC_REPOSITORY=/backups
      - RESTIC_PASSWORD=changeme
      - RDB_CRON_SCHEDULE=0 2 * * *
      - RDB_LOG_LEVEL=info

  postgres:
    image: postgres:17
    labels:
      rdb.postgres: "true"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydb

  mysql:
    image: mysql:8
    labels:
      rdb.mysql: "true"
    environment:
      MYSQL_ROOT_PASSWORD: secret

  mariadb:
    image: mariadb:11
    labels:
      rdb.mariadb: "true"
    environment:
      MARIADB_ROOT_PASSWORD: secret

  app:
    image: nginx
    labels:
      rdb.volumes: "true"
    volumes:
      - app-data:/usr/share/nginx/html

volumes:
  rdb-cache:
  app-data:
